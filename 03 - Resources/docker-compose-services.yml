# Hermes Pi — services stack (hardened).
#
# Secrets are loaded from a sibling `.env` file. Required variables:
#   PIHOLE_PASSWORD, GRAFANA_PASSWORD, HERMES_API_KEY
# (see .env.example). The stack will FAIL TO START if any required var is
# missing — this is intentional. Do NOT add `:-default` fallbacks.

services:
  # ── DNS Ad-Blocker ──────────────────────────
  # Pi-hole v6 uses a new API. The pre-built exporter does not work;
  # `pihole_exporter.py` runs as a systemd service on the host.
  pihole:
    image: pihole/pihole:2024.07.0
    container_name: pihole
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - etc-pihole:/etc/pihole
      - etc-dnsmasq:/etc/dnsmasq.d
    environment:
      TZ: America/Sao_Paulo
      WEBPASSWORD: ${PIHOLE_PASSWORD:?PIHOLE_PASSWORD must be set in .env}
      PIHOLE_DNS_: 1.1.1.1;8.8.8.8
      DNSSEC: "true"

  # ── Monitoring ──────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --web.listen-address=127.0.0.1:9100

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      # Bind to localhost — front with reverse proxy + auth, or SSH tunnel.
      - --web.listen-address=127.0.0.1:9090

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      # Bind to localhost; reach via SSH tunnel or reverse proxy.
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel

  # ── AI Gateway ──────────────────────────────
  hermes:
    image: nousresearch/hermes-agent:main
    container_name: hermes
    restart: unless-stopped
    ports:
      # LAN-only; do not expose on 0.0.0.0.
      - "127.0.0.1:8642:8642"
    volumes:
      - ~/.hermes:/opt/data
    environment:
      HERMES_UID: "1000"
      HERMES_GID: "1000"
      TZ: America/Sao_Paulo
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: ${HERMES_API_KEY:?HERMES_API_KEY must be set in .env}
    command: gateway run

  # ── AI Dashboard ────────────────────────────
  # WARNING: dashboard runs --insecure (no auth, exposes API keys/configs).
  # Bound to localhost; reach via SSH tunnel only.
  hermes-dashboard:
    image: nousresearch/hermes-agent:main
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - hermes
    ports:
      - "127.0.0.1:9119:9119"
    volumes:
      - ~/.hermes:/opt/data
    environment:
      HERMES_UID: "1000"
      HERMES_GID: "1000"
    command: ["dashboard", "--host", "127.0.0.1", "--no-open", "--insecure"]

  # ── Container Metrics ───────────────────────
  # Per-container CPU/RAM/network/restart count. Required for "all containers"
  # visibility — node-exporter only sees the host.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    network_mode: host
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - --housekeeping_interval=10s
      - --docker_only=true
      - --listen_ip=127.0.0.1
      - --port=8080
      - --store_container_labels=false
      - --whitelisted_container_labels=com.docker.compose.service

  # ── HTTP/TCP Probes ─────────────────────────
  # Health checks for Hermes API, OMLX (Mac), Grafana, Pi-hole admin.
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9115:9115"
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

volumes:
  etc-pihole:
  etc-dnsmasq:
  prometheus-data:
  grafana-data:
